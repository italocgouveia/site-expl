<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Estoque Explosion Energy</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Estoque Explosion Energy</h1>
  </header>

  <main class="container">

    <!-- ADICIONAR PRODUTO -->
    <section class="card">
      <h2>Adicionar Produto</h2>

      <form>
        <input type="text" placeholder="Nome do energético">

        <input type="number" placeholder="Quantidade">

        <input type="text" placeholder="Categoria">

        <button type="submit">
          Adicionar
        </button>
      </form>
    </section>

    <!-- PESQUISAR -->
    <section class="card">
      <h2>Pesquisar Produto</h2>

      <input type="text" placeholder="Pesquisar energético...">

      <button>
        Pesquisar
      </button>
    </section>

    <!-- TABELA -->
    <section class="card">
      <h2>Produtos em Estoque</h2>

      <table>
        <thead>
          <tr>
            <th>Produto</th>
            <th>Quantidade</th>
            <th>Categoria</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody>

          <tr>
            <td>Explosion Morango</td>
            <td>24</td>
            <td>Energético</td>

            <td>
              <button>Atualizar</button>
              <button>Remover</button>
            </td>
          </tr>

          <tr>
            <td>Explosion Prime Uva</td>
            <td>18</td>
            <td>Energético</td>

            <td>
              <button>Atualizar</button>
              <button>Remover</button>
            </td>
          </tr>

          <tr>
            <td>Explosion Açaí</td>
            <td>32</td>
            <td>Energético</td>

            <td>
              <button>Atualizar</button>
              <button>Remover</button>
            </td>
          </tr>

          <tr>
            <td>Explosion Citrus</td>
            <td>15</td>
            <td>Energético</td>

            <td>
              <button>Atualizar</button>
              <button>Remover</button>
            </td>
          </tr>

          <tr>
            <td>Explosion Prime Manga</td>
            <td>20</td>
            <td>Energético</td>

            <td>
              <button>Atualizar</button>
              <button>Remover</button>
            </td>
          </tr>

        </tbody>
      </table>
    </section>

  </main>

</body>

</html>
